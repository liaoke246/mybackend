name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
            SOURCE_BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            SOURCE_SHA="${{ github.sha }}"
            SOURCE_BRANCH="${{ github.ref_name }}"
          fi

          IMAGE_REF="ghcr.io/${{ github.repository }}:sha-${SOURCE_SHA}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${IMAGE_REF}"
            if [ "${SOURCE_BRANCH}" = "${{ github.event.repository.default_branch }}" ]; then
              echo "ghcr.io/${{ github.repository }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            SKIP_TESTS=true

  deploy:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ github.event.repository.name }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_NAME,GHCR_USERNAME,GHCR_TOKEN,IMAGE_REF
          script_stop: true
          script: |
            set -eu

            DEPLOY_DIR="$HOME/$APP_NAME"
            ENV_FILE="$DEPLOY_DIR/.env"

            mkdir -p "$DEPLOY_DIR"

            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE_REF"
            docker rm -f "$APP_NAME" || true
            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              --env-file "$ENV_FILE" \
              -p 8080:8080 \
              "$IMAGE_REF"
            docker image prune -f
